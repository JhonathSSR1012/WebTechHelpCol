<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechHelpCol - Servicios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #0a2b3e; margin-bottom: 10px; }
        .sub { color: #2ecc71; margin-bottom: 30px; }
        
        .product-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .product-item {
            background: #f9f9f9;
            border-radius: 20px;
            width: 320px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .product-item.selected {
            border-color: #2ecc71;
            background: #e8f8f0;
            transform: scale(1.02);
        }
        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #0a2b3e;
            margin: 10px 0;
        }
        .product-status {
            margin-top: 10px;
            font-size: 12px;
            padding: 5px;
            border-radius: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 11px;
            margin: 2px;
        }
        .badge-success { background: #2ecc71; color: white; }
        .badge-danger { background: #e74c3c; color: white; }
        .badge-info { background: #3498db; color: white; }
        
        .proyecto-gallery {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 2px solid #dee2e6;
        }
        .gallery-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #0a2b3e;
        }
        .gallery-title i { color: #2ecc71; margin-right: 10px; }
        
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }
        .gallery-item {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .gallery-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #ddd;
            transition: all 0.3s;
        }
        .gallery-img:hover {
            transform: scale(1.05);
            border-color: #2ecc71;
        }
        
        .payment-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }
        .btn-pago {
            padding: 15px 35px;
            font-weight: bold;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }
        .btn-pago:hover { transform: scale(1.05); }
        .btn-nequi { background: #7a2be0; color: white; }
        .btn-davivienda { background: #e31e24; color: white; }
        
        .recibo {
            background: #fef9e6;
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border-left: 8px solid #2ecc71;
            display: none;
        }
        .recibo.visible { display: block; }
        
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .btn-volver {
            background: #2ecc71;
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
        }
        
        .modal-imagen {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            cursor: pointer;
        }
        .modal-imagen img {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            margin-top: 5%;
        }
        .modal-imagen .cerrar-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            .gallery-img { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-cogs"></i> Módulo de Servicios</h1>
    <div class="sub">Selecciona un proyecto y realiza el pago para generar tu recibo</div>

    <!-- Lista de proyectos -->
    <div class="product-list" id="productList"></div>

    <!-- Galería de imágenes del proyecto seleccionado -->
    <div class="proyecto-gallery" id="galeriaProyecto">
        <div class="gallery-title">
            <i class="fas fa-folder-open"></i> Imágenes del Proyecto Seleccionado
        </div>
        <div id="galleryContainer" class="gallery"></div>
    </div>

    <!-- Botones de pago -->
    <div class="payment-buttons">
        <button class="btn-pago btn-nequi" id="pagarNequi">
            <i class="fas fa-mobile-alt"></i> Pagar con Nequi
        </button>
        <button class="btn-pago btn-davivienda" id="pagarDavivienda">
            <i class="fas fa-university"></i> Pagar con Davivienda
        </button>
    </div>

    <!-- Recibo -->
    <div id="recibo" class="recibo">
        <h3><i class="fas fa-receipt"></i> RECIBO DE PAGO - TechHelpCol</h3>
        <div id="reciboContent"></div>
        <button id="imprimirRecibo" style="margin-top:20px; background:#2c3e50; border:none; padding:10px 20px; color:white; border-radius:40px; cursor:pointer;">
            <i class="fas fa-print"></i> Imprimir Recibo
        </button>
    </div>

    <a href="index.html" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
</div>

<!-- Modal para ver imagen ampliada -->
<div id="modalImagen" class="modal-imagen" onclick="cerrarModal()">
    <span class="cerrar-modal">&times;</span>
    <img id="imagenAmpliada" src="">
</div>

<script>
    // ==================== CONFIGURACIÓN DE PROYECTOS ====================
    const proyectos = [
        { 
            id: 1, 
            nombre: "🏗️ StarMarket_System - APP Supermercado", 
            descripcion: "Implementación de inventarios, pagos",
            precio: 400000,
            carpeta: "StarMarket_System"
        },
        { 
            id: 2, 
            nombre: "🏭 LectorFactXML - Lector de facturación XML", 
            descripcion: "Lector de facturación DIAN, convertidor de XML",
            precio: 300000,
            carpeta: "LectorFactXML"
        },
        { 
            id: 3, 
            nombre: "🔐 QRVentas - Sistema QR de Ventas", 
            descripcion: "Implementación de un sistema QR de ventas para tiendas, abarrotes, supermercados",
            precio: 440000,
            carpeta: "QRVentas"
        }
    ];
    
    // Lista de imágenes por proyecto
    const imagenesPorProyecto = {
        1: [
            "StarMarket_System/imgR.png",
            "StarMarket_System/imgSp.png",
            "StarMarket_System/imgV.png",
            "StarMarket_System/imgCl.png",
            "StarMarket_System/imglnv.png",
            "StarMarket_System/imglnv1.png",
            "StarMarket_System/imgPed.png",
            "StarMarket_System/imgProvee.png",
            "StarMarket_System/imgInfo.png"
        ],
        2: [
            "LectorFactXML/imgLec.png",
            "LectorFactXML/imgLec2.png",
            "LectorFactXML/imgLec3.png",
            "LectorFactXML/imgLec4.png"
        ],
        3: [
            "QRVentas/imgQr.png",
            "QRVentas/imgQr2.png",
            "QRVentas/imgQr3.png",
            "QRVentas/imgQr4.png",
            "QRVentas/imgQr5.png"
        ]
    };
    
    let proyectoSeleccionado = null;
    let pagoRealizado = false;
    
    // Función para cargar y mostrar las imágenes del proyecto seleccionado
    function cargarImagenesProyecto(proyectoId) {
        const gallery = document.getElementById('galleryContainer');
        const imagenes = imagenesPorProyecto[proyectoId] || [];
        
        if (imagenes.length === 0) {
            gallery.innerHTML = '<p style="color:#999; text-align:center;">📷 No hay imágenes disponibles para este proyecto.</p>';
            return;
        }
        
        gallery.innerHTML = '';
        
        imagenes.forEach((imgUrl) => {
            const img = new Image();
            img.onload = () => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <img src="${imgUrl}" class="gallery-img" onclick="abrirModal('${imgUrl}')">
                `;
                gallery.appendChild(div);
            };
            img.onerror = () => {};
            img.src = imgUrl;
        });
        
        setTimeout(() => {
            if (gallery.children.length === 0) {
                gallery.innerHTML = '<p style="color:#999; text-align:center;">⚠️ No se encontraron imágenes en la carpeta del proyecto.</p>';
            }
        }, 1000);
    }
    
    // Funciones para el modal de imágenes
    function abrirModal(src) {
        const modal = document.getElementById('modalImagen');
        const imgAmpliada = document.getElementById('imagenAmpliada');
        modal.style.display = 'block';
        imgAmpliada.src = src;
    }
    
    function cerrarModal() {
        document.getElementById('modalImagen').style.display = 'none';
    }
    
    window.abrirModal = abrirModal;
    window.cerrarModal = cerrarModal;
    
    function mostrarAlerta(elementId, mensaje, tipo) {
        const alert = document.getElementById(elementId);
        alert.textContent = mensaje;
        alert.className = `alert alert-${tipo}`;
        setTimeout(() => {
            alert.className = 'alert';
        }, 5000);
    }
    
    // ========== RENDERIZAR PROYECTOS ==========
    function renderizarProyectos() {
        const container = document.getElementById('productList');
        container.innerHTML = '';
        
        proyectos.forEach(proy => {
            const div = document.createElement('div');
            div.className = `product-item ${proyectoSeleccionado?.id === proy.id ? 'selected' : ''}`;
            div.dataset.id = proy.id;
            div.innerHTML = `
                <div style="font-size:18px; font-weight:bold;">${proy.nombre}</div>
                <div class="product-price">$${proy.precio.toLocaleString('es-CO')} COP</div>
                <div style="font-size:13px; color:#666; margin:10px 0;">${proy.descripcion}</div>
                <div class="product-status">
                    <span class="status-badge badge-info">💳 Pago con QR</span>
                </div>
                ${proyectoSeleccionado?.id === proy.id ? '<i class="fas fa-check-circle" style="color:#2ecc71; margin-top:10px; font-size:20px;"></i>' : ''}
            `;
            div.onclick = () => {
                if (proyectoSeleccionado?.id !== proy.id) {
                    pagoRealizado = false;
                    document.getElementById('recibo').classList.remove('visible');
                }
                proyectoSeleccionado = proy;
                renderizarProyectos();
                cargarImagenesProyecto(proy.id);
            };
            container.appendChild(div);
        });
    }
    
    // ========== GENERAR RECIBO ==========
    function generarRecibo(metodoPago, referencia) {
        if (!proyectoSeleccionado) return null;
        
        return {
            numero: `R-${Date.now()}-${Math.floor(Math.random()*10000)}`,
            fecha: new Date().toLocaleString('es-CO'),
            proyecto: proyectoSeleccionado.nombre,
            descripcion: proyectoSeleccionado.descripcion,
            monto: proyectoSeleccionado.precio,
            metodo: metodoPago,
            referencia: referencia,
            cliente: "Cliente Web - TechHelpCol"
        };
    }
    
    function mostrarRecibo(recibo) {
        const container = document.getElementById('reciboContent');
        container.innerHTML = `
            <p><strong>🧾 N° Recibo:</strong> ${recibo.numero}</p>
            <p><strong>📅 Fecha:</strong> ${recibo.fecha}</p>
            <p><strong>🏗️ Proyecto:</strong> ${recibo.proyecto}</p>
            <p><strong>📝 Descripción:</strong> ${recibo.descripcion}</p>
            <p><strong>💰 Monto:</strong> $${recibo.monto.toLocaleString('es-CO')} COP</p>
            <p><strong>💳 Método de pago:</strong> ${recibo.metodo}</p>
            <p><strong>🔑 Referencia:</strong> ${recibo.referencia}</p>
            <hr>
            <p><i class="fas fa-check-circle" style="color:#2ecc71; font-size:20px;"></i> <strong>¡Pago registrado exitosamente!</strong></p>
            <p style="margin-top:15px; font-size:12px; color:#666;">📧 Soporte: techhelp2026s@gmail.com | 📱 Celular: 3046101679</p>
            <p style="font-size:11px; color:#999;">TechHelpCol - Soluciones Tecnológicas Integrales</p>
        `;
        document.getElementById('recibo').classList.add('visible');
        
        // Guardar en historial
        const historial = JSON.parse(localStorage.getItem('historialCompras') || '[]');
        historial.unshift(recibo);
        localStorage.setItem('historialCompras', JSON.stringify(historial.slice(0, 20)));
    }
    
    // ========== PROCESAR PAGO ==========
    async function procesarPago(metodo) {
        if (!proyectoSeleccionado) {
            alert("⚠️ Por favor, selecciona un proyecto primero");
            return;
        }
        
        if (pagoRealizado) {
            alert("⚠️ Ya has realizado el pago para este proyecto. Puedes ver tu recibo arriba.");
            return;
        }
        
        const referencia = `PAGO-${proyectoSeleccionado.id}-${Date.now()}`;
        const metodoNombre = metodo === 'NEQUI' ? 'Nequi' : 'Davivienda';
        const monto = proyectoSeleccionado.precio;
        const servicio = proyectoSeleccionado.nombre;
        
        // Abrir ventana con QR de pago
        const urlPago = `pagos.html?show=${metodo === 'NEQUI' ? 'nequi' : 'davivienda'}&monto=${monto}&servicio=${encodeURIComponent(servicio)}`;
        
        // Abrir ventana de pago
        const ventanaPago = window.open(urlPago, '_blank', 'width=800,height=600,scrollbars=yes,resizable=yes');
        
        if (!ventanaPago) {
            alert("⚠️ Por favor, permite ventanas emergentes para continuar con el pago.");
            return;
        }
        
        // Esperar a que el usuario confirme el pago en la ventana emergente
        // Escuchar mensaje de confirmación
        function recibirConfirmacion(event) {
            if (event.data && event.data.type === 'PAGO_CONFIRMADO') {
                window.removeEventListener('message', recibirConfirmacion);
                pagoRealizado = true;
                
                mostrarAlerta('recibo', `✅ Pago confirmado!`, 'success');
                
                // Generar y mostrar recibo
                const recibo = generarRecibo(metodoNombre, event.data.referencia || referencia);
                mostrarRecibo(recibo);
                
                // Cerrar la ventana de pago si aún está abierta
                if (ventanaPago && !ventanaPago.closed) {
                    ventanaPago.close();
                }
            }
        }
        
        window.addEventListener('message', recibirConfirmacion);
    }
    
    // ========== EVENTOS ==========
    document.getElementById('pagarNequi').onclick = () => procesarPago('NEQUI');
    document.getElementById('pagarDavivienda').onclick = () => procesarPago('DAVIVIENDA');
    
    document.getElementById('imprimirRecibo').onclick = () => {
        const contenido = document.getElementById('reciboContent').innerHTML;
        const ventana = window.open('', '_blank');
        ventana.document.write(`
            <html>
            <head>
                <title>Recibo TechHelpCol</title>
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
                <style>
                    body { font-family: 'Segoe UI', sans-serif; padding: 40px; }
                    .recibo { max-width: 600px; margin: auto; background: #fef9e6; padding: 30px; border-radius: 20px; }
                </style>
            </head>
            <body>
                <div class="recibo">${contenido}</div>
                <script>window.print();<\/script>
            </body>
            </html>
        `);
        ventana.document.close();
    };
    
    // ========== INICIALIZAR ==========
    renderizarProyectos();
    if (proyectos.length > 0) {
        proyectoSeleccionado = proyectos[0];
        renderizarProyectos();
        cargarImagenesProyecto(proyectoSeleccionado.id);
    }
</script>
</body>
</html>
